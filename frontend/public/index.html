<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Management System | Multi-Service App</title>
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #10b981;
            --error: #ef4444;
            --accent: #c084fc;
        }

        body {
            margin: 0;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            background: radial-gradient(circle at top right, #1e1b4b, var(--bg));
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 2rem 1rem;
        }

        .container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            text-align: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            margin: 0;
            background: linear-gradient(135deg, #818cf8 0%, var(--accent) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .status-overview {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .status-item {
            display: flex;
            align-items: center;
            background: rgba(0,0,0,0.3);
            padding: 5px 12px;
            border-radius: 20px;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .dot { width: 8px; height: 8px; border-radius: 50%; margin-right: 8px; background: var(--text-dim); }
        .dot.online { background: var(--success); box-shadow: 0 0 10px var(--success); }
        .dot.offline { background: var(--error); box-shadow: 0 0 10px var(--error); }

        .layout-grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 2rem;
            margin-top: 2rem;
        }

        @media (max-width: 768px) {
            .layout-grid { grid-template-columns: 1fr; }
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.2rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; color: var(--text-dim); margin-bottom: 0.5rem; font-size: 0.85rem; }
        
        input {
            width: 100%;
            padding: 0.8rem 1rem;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 0.6rem;
            color: white;
            box-sizing: border-box;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.9rem;
            border-radius: 0.6rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(99, 102, 241, 0.3);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9rem;
        }

        th {
            text-align: left;
            color: var(--text-dim);
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }

        td {
            padding: 1rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }

        .id-badge {
            color: var(--text-dim);
            font-family: monospace;
            background: rgba(255,255,255,0.05);
            padding: 2px 6px;
            border-radius: 4px;
        }

        #logs {
            margin-top: 2rem;
            background: #000;
            padding: 1rem;
            border-radius: 0.8rem;
            font-family: monospace;
            font-size: 0.8rem;
            color: #10b981;
            height: 100px;
            overflow-y: auto;
            border: 1px solid #334155;
        }

        /* Loading Spinner */
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.1);
            border-top: 3px solid white;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>User Management</h1>
            <div class="status-overview">
                <div class="status-item"><div id="api-dot" class="dot"></div> API: <span id="api-text">Checking...</span></div>
                <div class="status-item"><div id="db-dot" class="dot"></div> Database: <span id="db-text">Checking...</span></div>
            </div>
        </header>

        <div class="layout-grid">
            <!-- Registration Form -->
            <div class="card">
                <h3 style="margin-top:0">Register New User</h3>
                <form id="user-form">
                    <div class="form-group">
                        <label>Username</label>
                        <input type="text" id="username" placeholder="e.g. john_doe" required>
                    </div>
                    <div class="form-group">
                        <label>Email Address</label>
                        <input type="email" id="email" placeholder="e.g. john@example.com" required>
                    </div>
                    <button type="submit" id="submit-btn">Add User</button>
                </form>
            </div>

            <!-- Users List Table -->
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:1.5rem">
                    <h3 style="margin:0">Existing Accounts</h3>
                    <button onclick="fetchUsers()" style="width:auto; padding:0.4rem 0.8rem; font-size:0.8rem; margin:0; background:rgba(255,255,255,0.05)">Refresh</button>
                </div>
                <table id="user-table">
                    <thead>
                        <tr>
                            <th width="40">ID</th>
                            <th>Username</th>
                            <th>Email</th>
                        </tr>
                    </thead>
                    <tbody id="user-body">
                        <tr><td colspan="3" style="text-align:center; color:var(--text-dim)">Fetching users...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div id="logs">System logs initialized...</div>
    </div>

    <script>
        const API_URL = 'http://localhost:5000';
        const logsEl = document.getElementById('logs');

        function addLog(msg) {
            const time = new Date().toLocaleTimeString();
            logsEl.innerHTML = `[${time}] ${msg}\n` + logsEl.innerHTML;
        }

        async function fetchUsers() {
            try {
                const res = await fetch(`${API_URL}/db`);
                const data = await res.json();
                
                if (data.status === 'connected') {
                    document.getElementById('api-dot').classList.add('online');
                    document.getElementById('db-dot').classList.add('online');
                    document.getElementById('api-text').innerText = 'Online';
                    document.getElementById('db-text').innerText = data.database;

                    const tbody = document.getElementById('user-body');
                    tbody.innerHTML = '';
                    
                    if (data.users.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="3" style="text-align:center; color:var(--text-dim)">No users found in database.</td></tr>';
                    } else {
                        data.users.forEach(user => {
                            const row = `<tr>
                                <td><span class="id-badge">${user.id}</span></td>
                                <td style="font-weight:600">${user.username}</td>
                                <td style="color:var(--text-dim)">${user.email}</td>
                            </tr>`;
                            tbody.innerHTML += row;
                        });
                    }
                    addLog('User list refreshed successfully.');
                }
            } catch (err) {
                document.getElementById('api-dot').classList.add('offline');
                document.getElementById('api-text').innerText = 'Offline';
                addLog('Error: ' + err.message);
            }
        }

        document.getElementById('user-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const originalText = btn.innerText;
            
            const username = document.getElementById('username').value;
            const email = document.getElementById('email').value;

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span> Working...';

            try {
                const res = await fetch(`${API_URL}/add`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, email })
                });
                
                const data = await res.json();
                if (data.status === 'success') {
                    addLog(`Success: User ${username} added to MySQL.`);
                    document.getElementById('user-form').reset();
                    fetchUsers(); // Refresh list
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                addLog('Registration Failed: ' + err.message);
            } finally {
                btn.disabled = false;
                btn.innerText = originalText;
            }
        });

        // Initialize state
        window.onload = fetchUsers;
    </script>
</body>
</html>
